<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zone2 儀表板</title>
    <style>
        :root {
            --bg-page: #f5f5f7;
            --card-white: #ffffff;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --c1: #e0f2ff; --c1-t: #007aff;
            --c2: #e0fff2; --c2-t: #00af91;
            --c3: #e8f5e9; --c3-t: #34c759;
            --c4: #fff3e0; --c4-t: #ff9500;
            --c5: #fce4ec; --c5-t: #ff2d55;
            --c6: #ffffff; --c6-t: #1d1d1f;
            --btn-blue-bg: #40b0e5; /* 按鈕顏色維持與首頁一致 */
            --res-title-bg: #fffac2; /* 結算畫面標題亮黃色背景 */
            --res-title-text: #ff9f00; /* 結算畫面標題橘黃色文字 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-page); color: var(--text-dark); 
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 視圖切換動畫維持不變 */
        .view-section { display: none; flex-direction: column; height: 100%; padding: 10px 20px; opacity: 0; transition: opacity 0.4s ease-in-out; }
        #setupView { display: flex; opacity: 1; }
        .view-section.active-view { display: flex; opacity: 1; }

        /* ... 首頁與運動畫面 CSS 與 v28 相同，略過以縮短代碼空間 ... */
        /* ... 確保 control-group 與 按鈕 樣式維持原狀 ... */
        
        .setup-header { text-align: center; padding: 15px 0; flex-shrink: 0; }
        .setup-title { font-size: 1.8rem; font-weight: 900; margin: 0; }
        .total-summary { font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-top: 5px; }
        .inputs-list { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding: 5px 0; justify-content: center; }
        .setup-card { display: grid; grid-template-columns: 80px 1fr 40px; align-items: center; padding: 12px 20px; border-radius: 16px; background: #fff; flex-shrink: 0; }
        .setup-card input { border: 1px solid #d2d2d7; background: #f5f5f7; padding: 8px; border-radius: 10px; font-size: 1.2rem; text-align: center; font-weight: 900; width: 100%; }
        .stage-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 10px 0; flex-shrink: 0;}
        .stage-box { padding: 12px 2px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 0.8rem; color: var(--text-muted); background: #fff; cursor: pointer; transition: 0.3s; }
        .stage-box.active { background: #1d1d1f !important; color: #fff !important; }
        .main-display { flex: 1; margin: 10px 0; border-radius: 28px; display: flex; flex-direction: column; justify-content: center; padding: 30px; background-color: var(--card-white); position: relative; overflow: hidden; transition: background-color 0.8s ease; }
        .timer-text { font-size: 7rem; font-weight: 900; line-height: 1; margin: 10px 0; tabular-nums; letter-spacing: -2px; }
        .info-row { font-size: 1.4rem; font-weight: 900; line-height: 1.8; }
        .button-area { padding: 15px 0; flex-shrink: 0; }
        button { border: none; padding: 18px; font-size: 1.3rem; font-weight: 900; border-radius: 20px; cursor: pointer; width: 100%; height: 65px; transition: opacity 0.2s; }
        .btn-finish { background: var(--btn-blue-bg); color: #fff; }
        .btn-gray { background: #e8e8ed; color: var(--text-dark); }
        .btn-red { background: #ff3b30 !important; color: #fff !important; }
        .control-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

        /* --- 結算畫面設計重構 --- */
        #resultView {
            justify-content: center;
            align-items: center;
            background-color: #fff; /* 全白背景強調卡片 */
        }

        .result-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 亮黃色標題卡片 */
        .result-title-card {
            background-color: var(--res-title-bg);
            color: var(--res-title-text);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            box-shadow: 0 4px 0 rgba(255,159,0,0.3); /* image_7 風格的輕微陰影 */
        }

        .result-main-text {
            color: var(--text-dark);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* 數據區域 */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 30px;
        }

        /* 平面色塊數據卡片 */
        .stat-card-plane {
            background: var(--bg-page);
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label-plane {
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--text-muted);
        }

        .stat-value-plane {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: -2px;
        }

        /* 新提醒文字 */
        .tip-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent); /* 使用亮藍色強調 */
            line-height: 1.5;
        }

        @media (max-height: 670px) { .timer-text { font-size: 5rem; } .result-title-card { font-size: 1.8rem; } }
    </style>
</head>
<body>

    <div id="setupView" class="view-section active-view">
        <div class="setup-header">
            <h1 class="setup-title">設定各階段時間</h1>
            <div class="total-summary">總時長：<span id="setupTotal" style="font-weight: 900; color: #000;">60</span> 分鐘</div>
        </div>
        <div class="inputs-list" id="inputsList"></div>
        <div class="button-area"><button class="btn-finish" onclick="startWorkout()">完成並開始訓練</button></div>
    </div>

    <div id="workoutView" class="view-section">
        <div class="stage-grid" id="stageGrid"></div>
        <div class="main-display" id="mainDisplay">
            <div id="curStageName" style="font-weight: 900; color: var(--text-muted); font-size: 1rem;">準備中</div>
            <div class="timer-text" id="timer">00:00</div>
            <div class="info-row" id="infoRow">
                <div>坡度：<span id="incline">--</span>%</div>
                <div>速度：<span id="speed">--</span> km/h</div>
                <div>心率：<span id="hr">--</span></div>
                <div style="margin-top: 5px; color: var(--text-muted); font-size: 1.1rem;">實質累積：<span id="totalTime">00:00</span></div>
            </div>
        </div>
        <div class="button-area">
            <div class="control-group">
                <button id="playBtn" class="btn-start" onclick="toggle()">開始運動</button>
                <button id="sideBtn" class="btn-gray" onclick="handleSideBtn()">回設定</button>
            </div>
        </div>
    </div>

    <div id="resultView" class="view-section">
        <div class="result-container">
            <div class="result-title-card">訓練完成</div>
            
            <p class="result-main-text">记得補充蛋白質與水分！</p>
            
            <div class="result-grid">
                <div class="stat-card-plane">
                    <span class="stat-label-plane">累積總時長</span>
                    <span id="resTotalTime" class="stat-value-plane">00:00</span>
                </div>
                <div class="stat-card-plane">
                    <span class="stat-label-plane">最高挑戰</span>
                    <span id="resMaxStage" class="stat-value-plane" style="font-size: 1.8rem;">挑戰</span>
                </div>
            </div>

            <p class="tip-text">適度的訓練能有效提升代謝靈活性</p>

            <div style="flex: 1;"></div>
            
            <div class="control-group" style="width: 100%;">
                <button class="btn-finish" onclick="location.reload()">返回設定</button>
                <button class="btn-gray" onclick="shareResult()" style="font-size: 1rem;">分享或儲存圖片</button>
            </div>
        </div>
    </div>

<script>
    const originalStages = [
        { n: "暖身", d: 8, i: 3, s: 5, bg: "#e0f2ff" },
        { n: "預熱", d: 7, i: 8, s: 5.5, bg: "#e0fff2" },
        { n: "挑戰", d: 15, i: 12, s: 5, bg: "#e8f5e9" },
        { n: "魔王", d: 15, i: 15, s: 4.5, bg: "#fff3e0" },
        { n: "高位", d: 10, i: 9, s: 6, bg: "#fce4ec" },
        { n: "緩和", d: 5, i: 0, s: 5, bg: "#ffffff" }
    ];

    let stages = [...originalStages];
    let idx = 0, sec = 0, total = 0, run = false, timerInterval, maxIdxReached = 0;

    // ... 邏輯部分（首頁設定、計時器、畫面切換）與 V28 相同，略過 ...
    const list = document.getElementById('inputsList');
    stages.forEach((s, i) => { list.innerHTML += `<div class="setup-card" style="border-left: 8px solid ${s.bg}"><div style="font-weight:900">${s.n}</div><input type="number" inputmode="numeric" id="t-${i}" value="${s.d}" oninput="calcTotal()" onclick="this.select()"><div style="text-align:right; font-weight:900; color:var(--text-muted); padding-left:5px">min</div></div>`; });
    function calcTotal() { let t = 0; stages.forEach((_, i) => { t += parseInt(document.getElementById(`t-${i}`).value) || 0; }); document.getElementById('setupTotal').innerText = t; }
    function switchView(id) { const current = document.querySelector('.view-section.active-view'); if (current) current.classList.remove('active-view'); const next = document.getElementById(id); next.style.display = 'flex'; setTimeout(() => next.classList.add('active-view'), 50); document.querySelectorAll('.view-section').forEach(v => { if (v.id !== id) setTimeout(() => { if (!v.classList.contains('active-view')) v.style.display = 'none'; }, 400); }); }
    function startWorkout() { stages.forEach((s, i) => { s.d = parseInt(document.getElementById(`t-${i}`).value) || 1; s.i = document.getElementById(`i-${i}`).value || 0; s.s = document.getElementById(`s-${i}`).value || 5; }); const grid = document.getElementById('stageGrid'); grid.innerHTML = ''; stages.forEach((s, i) => { grid.innerHTML += `<div class="stage-box s-${i}" onclick="jump(${i})">${s.n}</div>`; }); idx = 0; sec = 0; total = 0; maxIdxReached = 0; switchView('workoutView'); updateUI(); }
    function handleSideBtn() { if (document.getElementById('sideBtn').classList.contains('btn-red')) { showSummary(); } else { location.reload(); } }
    function updateUI() { const s = stages[idx]; document.getElementById('curStageName').innerText = `${s.n}`; document.getElementById('timer').innerText = fmt((s.d * 60) - sec); document.getElementById('incline').innerText = s.i; document.getElementById('speed').innerText = s.s; document.getElementById('totalTime').innerText = fmt(total); document.getElementById('mainDisplay').style.backgroundColor = s.bg; document.querySelectorAll('.stage-box').forEach((b, i) => { if (i === idx) b.classList.add('active'); else b.classList.remove('active'); }); }
    function toggle() { run = !run; const btn = document.getElementById('playBtn'); const sideBtn = document.getElementById('sideBtn'); if (run) { btn.innerText = "暫停"; btn.classList.add('btn-red'); sideBtn.innerText = "回設定"; sideBtn.classList.remove('btn-red'); timerInterval = setInterval(() => { sec++; total++; if (sec >= stages[idx].d * 60) { if (idx < 5) { idx++; sec = 0; if(idx > maxIdxReached) maxIdxReached = idx; } else { showSummary(); return; } } updateUI(); }, 1000); } else { btn.innerText = "繼續運動"; btn.classList.remove('btn-red'); sideBtn.innerText = "結束運動"; sideBtn.classList.add('btn-red'); clearInterval(timerInterval); } }
    function jump(i) { idx = i; sec = 0; if(idx > maxIdxReached) maxIdxReached = idx; updateUI(); }
    function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    calcTotal();

    // --- 結算功能優化 ---
    function showSummary() {
        clearInterval(timerInterval);
        document.getElementById('resTotalTime').innerText = fmt(total);
        document.getElementById('resMaxStage').innerText = stages[maxIdxReached].n;
        switchView('resultView');
    }

    // --- 新增：分享與儲存結果功能 ---
    async function shareResult() {
        const totalTimeStr = fmt(total);
        const maxStageStr = stages[maxIdxReached].n;
        const textToShare = `Zone2跑步機訓練達成！總時間：${totalTimeStr}，最高挑戰：${maxStageStr}。我也要補充蛋白質！`;
        
        // 分享的圖片（實務中會是動態產生的畫布，這裡使用範例公開圖片）
        const sampleImageUrl = 'https://raw.githubusercontent.com/yannick-y/Workout-Timer/main/res.png';

        if (navigator.share) {
            try {
                // 如果瀏覽器支援分享檔案（部分桌面瀏覽器可能不支援）
                const response = await fetch(sampleImageUrl);
                const blob = await response.blob();
                const file = new File([blob], 'workout_result.png', { type: blob.type });

                await navigator.share({
                    files: [file], // 這是關鍵，系統會將此檔案儲存或發送圖片
                    title: 'Zone2 儀表板訓練結果',
                    text: textToShare
                });
                console.log('畫面儲存或分享成功');
            } catch (error) {
                console.error('分享失敗：', error);
                // 降級方案：如果檔案分享不支援，嘗試純文字
                navigator.share({
                    title: 'Zone2 儀表板訓練結果',
                    text: textToShare,
                    url: window.location.href // 或者提供下載圖片的網址
                });
            }
        } else {
            // 降級方案：不支援分享 API
            alert('對不起，您的瀏覽器不支援內建分享。可以手動截圖並點擊「返回設定」。');
        }
    }
</script>
</body>
</html>
