<!DOCTYPE html>
<html lang="zh-TW">
<style>
    /* --- 結算畫面設計優化 --- */
    #resultView {
        justify-content: flex-start;
        padding-top: 40px;
    }

    .result-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .success-badge {
        background: var(--c2);
        color: var(--c2-t);
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 900;
        font-size: 1rem;
        margin-bottom: 10px;
    }

    .result-main-card {
        width: 100%;
        background: #fff;
        border-radius: 32px;
        padding: 40px 20px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .result-title {
        font-size: 2.2rem;
        font-weight: 900;
        margin-bottom: 5px;
        letter-spacing: -1px;
    }

    .result-subtitle {
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 30px;
    }

    .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        width: 100%;
    }

    .stat-card {
        background: var(--bg-page);
        padding: 20px 10px;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .stat-label {
        font-size: 0.8rem;
        font-weight: 900;
        color: var(--text-muted);
    }

    .stat-value {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--text-dark);
    }

    .congrats-text {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-top: 20px;
        line-height: 1.5;
    }
</style>

<div id="resultView" class="view-section">
    <div class="result-container">
        <div class="success-badge">MISSION ACCOMPLISHED</div>
        
        <div class="result-main-card">
            <h2 class="result-title">訓練完成</h2>
            <p class="result-subtitle">太棒了！您今天完成了一次高品質的訓練</p>
            
            <div class="result-grid">
                <div class="stat-card">
                    <span class="stat-label">累積總時長</span>
                    <span id="resTotalTime" class="stat-value">00:00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">最高挑戰</span>
                    <span id="resMaxStage" class="stat-value">--</span>
                </div>
            </div>

            <div class="congrats-text">
                適度的 Zone2 訓練能有效提升代謝靈活性，<br>休息片刻，補充水分吧！
            </div>
        </div>

        <div style="flex: 1;"></div>
        
        <div class="button-area" style="width: 100%;">
            <button class="btn-finish" onclick="location.reload()">回首頁</button>
        </div>
    </div>
</div>

<script>
    /* ... 邏輯部分 ... */
    function showSummary() {
        clearInterval(timerInterval);
        if (wakeLock) try { wakeLock.release(); } catch(e) {}
        
        // 更新數據
        document.getElementById('resTotalTime').innerText = fmt(total);
        // 抓取運動時更新的最高階段，若沒跳過則依據當前 idx
        document.getElementById('resMaxStage').innerText = stages[idx].n;
        
        switchView('resultView');
    }
    /* ... 其餘邏輯維持不變 ... */
</script>
