<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zone2 儀表板 V30</title>
    <style>
        :root {
            --bg-page: #f5f5f7;
            --card-white: #ffffff;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --c1: #e0f2ff; --c1-t: #007aff;
            --c2: #e0fff2; --c2-t: #00af91;
            --c3: #e8f5e9; --c3-t: #34c759;
            --c4: #fff3e0; --c4-t: #ff9500;
            --c5: #fce4ec; --c5-t: #ff2d55;
            --c6: #ffffff; --c6-t: #1d1d1f;
            --btn-blue-bg: #40b0e5;
            --prep-bg: #e5e5e7;
            --flash-red: rgba(255, 59, 48, 0.2);
            --res-title-bg: #fffac2;
            --res-title-text: #ff9f00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            background-color: var(--bg-page); color: var(--text-dark); 
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .view-section { display: none; flex-direction: column; height: 100%; padding: 10px 20px; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .view-section.active-view { display: flex; opacity: 1; }

        /* --- 設定畫面 --- */
        .setup-header { text-align: center; padding: 15px 0; flex-shrink: 0; }
        .setup-title { font-size: 1.8rem; font-weight: 900; margin: 0; }
        .total-summary { font-size: 1rem; color: var(--text-muted); font-weight: 600; margin-top: 5px; }
        .inputs-list { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding: 5px 0; justify-content: center; }
        .setup-card { display: grid; grid-template-columns: 80px 1fr 40px; align-items: center; padding: 12px 20px; border-radius: 16px; background: #fff; flex-shrink: 0; }
        .setup-card input { border: 1px solid #d2d2d7; background: #f5f5f7; padding: 8px; border-radius: 10px; font-size: 1.2rem; text-align: center; font-weight: 900; width: 100%; }

        /* --- 運動畫面 --- */
        .stage-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 10px 0; flex-shrink: 0;}
        .stage-box { padding: 12px 2px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 0.8rem; color: var(--text-muted); background: #fff; cursor: pointer; transition: 0.3s; }
        .stage-box.active { background: #1d1d1f !important; color: #fff !important; }
        
        .main-display { 
            flex: 1; margin: 10px 0; border-radius: 28px; display: flex; flex-direction: column; 
            justify-content: center; padding: 30px; background-color: var(--card-white); 
            position: relative; overflow: hidden; transition: background-color 0.8s ease; 
        }
        
        @keyframes soft-pulse { 0% { background-color: transparent; } 50% { background-color: var(--flash-red); } 100% { background-color: transparent; } }
        .flash-pulse { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .pulse-active { animation: soft-pulse 0.4s ease-in-out; }

        .timer-text { font-size: 7rem; font-weight: 900; line-height: 1; margin: 10px 0; tabular-nums; letter-spacing: -2px; text-align: center; }
        .info-row { font-size: 1.4rem; font-weight: 900; line-height: 1.8; z-index: 2; }
        .target-label { font-size: 0.7rem; vertical-align: middle; color: var(--text-dark); background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; margin-right: 6px; font-weight: 800; }

        .button-area { padding: 15px 0; flex-shrink: 0; }
        button { border: none; padding: 18px; font-size: 1.3rem; font-weight: 900; border-radius: 20px; cursor: pointer; width: 100%; height: 65px; transition: opacity 0.2s; }
        .btn-finish, .btn-start { background: var(--btn-blue-bg); color: #fff; }
        .btn-gray { background: #e8e8ed; color: var(--text-dark); }
        .btn-red { background: #ff3b30 !important; color: #fff !important; }
        .control-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

        /* --- 結算畫面 --- */
        #resultView { justify-content: center; align-items: center; background-color: #fff; }
        .result-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .result-title-card { background-color: var(--res-title-bg); color: var(--res-title-text); padding: 15px 30px; border-radius: 15px; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; box-shadow: 0 4px 0 rgba(255,159,0,0.2); }
        .result-main-text { color: var(--text-dark); font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin: 20px 0; }
        .stat-card-plane { background: var(--bg-page); padding: 20px 10px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; gap: 5px; }
        .stat-label-plane { font-size: 0.85rem; font-weight: 900; color: var(--text-muted); }
        .stat-value-plane { font-size: 2.2rem; font-weight: 900; color: var(--text-dark); letter-spacing: -1px; }

        @media (max-height: 670px) { .timer-text { font-size: 5rem; } .result-title-card { font-size: 1.8rem; } }
    </style>
</head>
<body>

    <div id="setupView" class="view-section active-view">
        <div class="setup-header">
            <h1 class="setup-title">設定各階段時間</h1>
            <div class="total-summary">總時長：<span id="setupTotal" style="font-weight: 900; color: #000;">60</span> 分鐘</div>
        </div>
        <div class="inputs-list" id="inputsList"></div>
        <div class="button-area"><button class="btn-finish" onclick="startWorkout()">完成並開始訓練</button></div>
    </div>

    <div id="workoutView" class="view-section">
        <div class="stage-grid" id="stageGrid"></div>
        <div class="main-display" id="mainDisplay">
            <div id="flashLayer" class="flash-pulse"></div>
            <div id="curStageName" style="font-weight: 900; color: var(--text-muted); font-size: 1rem; z-index: 2;">準備中</div>
            <div class="timer-text" id="timer" style="z-index: 2;">00:00</div>
            <div class="info-row" id="infoRow" style="z-index: 2;">
                <div><span id="inclineLabel"></span>坡度：<span id="incline">--</span>%</div>
                <div><span id="speedLabel"></span>速度：<span id="speed">--</span> km/h</div>
                <div id="totalTimeRow" style="margin-top: 5px; color: var(--text-muted); font-size: 1.1rem;">實質累積：<span id="totalTime">00:00</span></div>
            </div>
        </div>
        <div class="button-area">
            <div class="control-group">
                <button id="playBtn" class="btn-start" onclick="toggle()">開始運動</button>
                <button id="sideBtn" class="btn-gray" onclick="handleSideBtn()">回設定</button>
            </div>
        </div>
    </div>

    <div id="resultView" class="view-section">
        <div class="result-container">
            <div class="result-title-card">訓練完成</div>
            <p class="result-main-text">記得補充蛋白質與水分！</p>
            <div class="result-grid">
                <div class="stat-card-plane">
                    <span class="stat-label-plane">累積總時長</span>
                    <span id="resTotalTime" class="stat-value-plane">00:00</span>
                </div>
                <div class="stat-card-plane">
                    <span class="stat-label-plane">最高挑戰</span>
                    <span id="resMaxStage" class="stat-value-plane" style="font-size: 1.6rem;">暖身</span>
                </div>
            </div>
            <div style="flex: 1;"></div>
            <div class="control-group" style="width: 100%;">
                <button class="btn-finish" onclick="location.reload()">返回設定</button>
                <button class="btn-gray" onclick="shareResult()" style="font-size: 1rem;">分享或儲存圖片</button>
            </div>
        </div>
    </div>

<script>
    const originalStages = [
        { n: "暖身", d: 8, i: 3, s: 5, bg: "#e0f2ff" },
        { n: "預熱", d: 7, i: 8, s: 5.5, bg: "#e0fff2" },
        { n: "挑戰", d: 15, i: 12, s: 5, bg: "#e8f5e9" },
        { n: "魔王", d: 15, i: 15, s: 4.5, bg: "#fff3e0" },
        { n: "高位", d: 10, i: 9, s: 6, bg: "#fce4ec" },
        { n: "緩和", d: 5, i: 0, s: 5, bg: "#ffffff" }
    ];

    let stages = [...originalStages];
    let idx = 0, sec = 0, total = 0, run = false, timerInterval, maxIdxReached = 0;
    let isPrep = false, prepSec = 10;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function softFlash() {
        const layer = document.getElementById('flashLayer');
        layer.classList.remove('pulse-active');
        void layer.offsetWidth;
        layer.classList.add('pulse-active');
    }

    const list = document.getElementById('inputsList');
    stages.forEach((s, i) => {
        list.innerHTML += `<div class="setup-card" style="border-left: 8px solid ${s.bg}"><div style="font-weight:900">${s.n}</div><input type="number" inputmode="numeric" id="t-${i}" value="${s.d}" oninput="calcTotal()" onclick="this.select()"><div style="text-align:right; font-weight:900; color:var(--text-muted); padding-left:5px">min</div></div>`;
    });

    function calcTotal() {
        let t = 0;
        stages.forEach((_, i) => { t += parseInt(document.getElementById(`t-${i}`).value) || 0; });
        document.getElementById('setupTotal').innerText = t;
    }

    function switchView(id) {
        const current = document.querySelector('.view-section.active-view');
        if (current) current.classList.remove('active-view');
        const next = document.getElementById(id);
        next.style.display = 'flex';
        setTimeout(() => next.classList.add('active-view'), 50);
        document.querySelectorAll('.view-section').forEach(v => {
            if (v.id !== id) setTimeout(() => { if (!v.classList.contains('active-view')) v.style.display = 'none'; }, 400);
        });
    }

    function startWorkout() {
        stages.forEach((s, i) => { s.d = parseInt(document.getElementById(`t-${i}`).value) || 1; });
        const grid = document.getElementById('stageGrid');
        grid.innerHTML = '';
        stages.forEach((s, i) => { grid.innerHTML += `<div class="stage-box s-${i}" onclick="jump(${i})">${s.n}</div>`; });
        idx = 0; sec = 0; total = 0; isPrep = true; prepSec = 10; maxIdxReached = 0;
        switchView('workoutView');
        updateUI();
    }

    function updateUI() {
        const s = stages[idx];
        const display = document.getElementById('mainDisplay');
        const totalTimeRow = document.getElementById('totalTimeRow');
        const incLabel = document.getElementById('inclineLabel');
        const spdLabel = document.getElementById('speedLabel');
        
        document.querySelectorAll('.stage-box').forEach((b, i) => { if (i === idx) b.classList.add('active'); else b.classList.remove('active'); });

        if (isPrep) {
            display.style.backgroundColor = "var(--prep-bg)";
            document.getElementById('curStageName').innerText = `即將進入：${s.n}`;
            document.getElementById('timer').innerText = `00:${prepSec.toString().padStart(2, '0')}`;
            incLabel.innerHTML = `<span class="target-label">NEXT</span>`;
            spdLabel.innerHTML = `<span class="target-label">NEXT</span>`;
            document.getElementById('incline').innerText = s.i;
            document.getElementById('speed').innerText = s.s;
            totalTimeRow.style.visibility = "hidden";
        } else {
            display.style.backgroundColor = s.bg;
            document.getElementById('curStageName').innerText = s.n;
            document.getElementById('timer').innerText = fmt((s.d * 60) - sec);
            incLabel.innerHTML = ""; spdLabel.innerHTML = "";
            document.getElementById('incline').innerText = s.i;
            document.getElementById('speed').innerText = s.s;
            totalTimeRow.style.visibility = "visible";
            document.getElementById('totalTime').innerText = fmt(total);
        }
    }

    function tick() {
        if (isPrep) {
            prepSec--;
            if (run && prepSec <= 3 && prepSec > 0) playBeep(800, 0.1);
            if (prepSec <= 0) { isPrep = false; if (run) playBeep(1200, 0.4); }
        } else {
            sec++; total++;
            const s = stages[idx];
            const rem = (s.d * 60) - sec;
            if (run) {
                if (rem === 30) { playBeep(600, 0.2); softFlash(); }
                if (rem <= 5 && rem > 0) { playBeep(1000, 0.1); softFlash(); }
            }
            if (sec >= s.d * 60) {
                if (idx < 5) { idx++; sec = 0; isPrep = true; prepSec = 10; if(idx > maxIdxReached) maxIdxReached = idx; } 
                else { showSummary(); return; }
            }
        }
        updateUI();
    }

    function toggle() {
        run = !run;
        const btn = document.getElementById('playBtn');
        const sideBtn = document.getElementById('sideBtn');
        if (run) {
            btn.innerText = "暫停"; btn.classList.add('btn-red');
            sideBtn.innerText = "回設定"; sideBtn.classList.remove('btn-red');
            timerInterval = setInterval(tick, 1000);
        } else {
            btn.innerText = "繼續運動"; btn.classList.remove('btn-red');
            sideBtn.innerText = "結束運動"; sideBtn.classList.add('btn-red');
            clearInterval(timerInterval);
        }
    }

    function handleSideBtn() {
        if (document.getElementById('sideBtn').classList.contains('btn-red')) {
            showSummary();
        } else {
            location.reload();
        }
    }

    function showSummary() {
        clearInterval(timerInterval);
        document.getElementById('resTotalTime').innerText = fmt(total);
        document.getElementById('resMaxStage').innerText = stages[maxIdxReached].n;
        switchView('resultView');
    }

    function jump(i) { idx = i; sec = 0; isPrep = true; prepSec = 10; if(idx > maxIdxReached) maxIdxReached = idx; updateUI(); }
    function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    async function shareResult() {
        const text = `Zone2訓練達成！總時間：${fmt(total)}，最高挑戰：${stages[maxIdxReached].n}。記得補充蛋白質！`;
        if (navigator.share) {
            try { await navigator.share({ title: 'Zone2 訓練結果', text: text, url: window.location.href }); } catch (err) {}
        } else { alert('請手動截圖分享結算畫面！'); }
    }

    calcTotal();
</script>
</body>
</html>
